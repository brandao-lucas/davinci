services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: davinci_db
      POSTGRES_USER: davinci
      POSTGRES_PASSWORD: davinci_dev
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-davinci_dev}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-davinci_dev_secret}
    ports:
      - "9000:9000"   # API S3-compatible
      - "9001:9001"   # console web
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cria o bucket inicial e sai. Roda apenas na primeira vez (idempotente).
  # mc exit 0 se bucket já existir.
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-davinci_dev} ${MINIO_ROOT_PASSWORD:-davinci_dev_secret};
      mc mb --ignore-existing local/davinci-omics;
      mc anonymous set none local/davinci-omics;
      echo 'Bucket davinci-omics pronto.';
      "

volumes:
  pgdata:
  miniodata:
