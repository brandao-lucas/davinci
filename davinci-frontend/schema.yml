  /api/v1/projects/{project_pk}/variants/:
    get:
      operationId: projects_variants_list
      description: 'Retorna lista paginada de variantes (rs numbers) mencionadas nos
        papers do projeto, agrupadas por rs_number. Inclui contagens de citações únicas
        (included e total), soma de menções e anotação clínica resumida (nullable).
        Filtros: ?q= (icontains no rs_number), ?ordering= (unique_citations_included
        | unique_citations_total | mention_count_total | rs_number; prefixe com ''-''
        para DESC), ?included_only=true (omite variantes sem nenhum paper incluído).
        Default: -unique_citations_included. Paginação: ?page=, ?page_size= (máx 100).'
      summary: Lista variantes do projeto (agregada)
      parameters:
      - in: query
        name: included_only
        schema:
          type: boolean
        description: 'Quando true, retorna apenas variantes com ao menos um paper
          com curation_status=included (unique_citations_included > 0). Aceita true/false/1/0.
          Default: false.'
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Campo de ordenação. Valores válidos: unique_citations_included,
          unique_citations_total, mention_count_total, rs_number (prefixe com - para
          DESC).'
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: q
        schema:
          type: string
        description: Filtro por rs_number (icontains).
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectVariantListList'
          description: ''
  /api/v1/projects/{project_pk}/variants/{rs_number}/:
    get:
      operationId: projects_variants_retrieve
      description: Retorna métricas da variante, anotação clínica completa (nullable)
        e, para cada paper do projeto que a cita, as sentenças do abstract onde a
        variante aparece (snippets). Se o cache de snippets estiver frio ou stale
        para algum paper, uma task Celery é disparada e context_status='computing'
        é retornado; chamadas subsequentes retornam 'ready' quando o cache estiver
        pronto. rs_number inválido (> 32 chars) ou inexistente no projeto → 404.
      summary: Detalhe de variante do projeto (com snippets de contexto)
      parameters:
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: rs_number
        schema:
          type: string
        required: true
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectVariantDetail'
          description: ''
components:
  schemas:
    AddDatasetToProjectRequest:
      type: object
      description: |-
        Request body para POST /projects/{project_pk}/datasets/add_from_suggestion/.

        O campo `dataset_id` identifica o OmicDataset global a ser vinculado.
        Esse id vem de OrphanLinkSuggestionSerializer.dataset_id (Nível 2).
      properties:
        dataset_id:
          type: integer
          minimum: 1
          description: PK de OmicDataset (dataset global) a adicionar ao projeto.
      required:
      - dataset_id
    AddPaperToProjectRequest:
      type: object
      description: |-
        Request body para POST /projects/{project_pk}/papers/add_from_suggestion/.

        O campo `pmid` identifica o Paper global a ser vinculado ao projeto.
        Esse PMID vem de OrphanLinkSuggestionSerializer.paper_pmid (Nível 2).
      properties:
        pmid:
          type: integer
          minimum: 1
          description: PMID do paper global (Paper.pmid) a adicionar ao projeto.
      required:
      - pmid
    BlankEnum:
      enum:
      - ''
    BulkCurateResponse:
      type: object
      description: 'Resposta genérica de operações bulk: quantidade de registros atualizados.'
      properties:
        updated:
          type: integer
      required:
      - updated
    ClinicalCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          title: Nome
          maxLength: 100
        description:
          type: string
          title: Descrição
        keywords:
          title: Keywords de Classificação
          description: Termos usados pelo Rust para detectar esta categoria no abstract
        is_default:
          type: boolean
          title: Categoria Padrão
          description: True para os 5 eixos padrão (não deletável)
        priority:
          type: integer
          maximum: 32767
          minimum: 0
          title: Prioridade
      required:
      - id
      - name
      - slug
    ClinicalCategoryBrief:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          title: Nome
          maxLength: 100
      required:
      - id
      - name
      - slug
    ConfidenceEnum:
      enum:
      - auto
      - confirmed
      - rejected
      type: string
      description: |-
        * `auto` - Automático (elink/co-ocorrência)
        * `confirmed` - Confirmado pelo Pesquisador
        * `rejected` - Rejeitado pelo Pesquisador
    ContextStatusEnum:
      enum:
      - ready
      - computing
      type: string
      description: |-
        * `ready` - ready
        * `computing` - computing
    CurationStatusEnum:
      enum:
      - pending
      - included
      - excluded
      - maybe
      type: string
      description: |-
        * `pending` - Pendente
        * `included` - Incluído
        * `excluded` - Excluído
        * `maybe` - Talvez
    DaVinciProject:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        query_synonyms:
          type: array
          items:
            type: string
        target_organisms:
          type: array
          items:
            type: string
        target_tissues:
          type: array
          items:
            type: string
        total_papers:
          type: integer
          readOnly: true
          default: 0
        total_datasets:
          type: integer
          readOnly: true
          default: 0
        selected_mesh: {}
        mesh_default_mode:
          allOf:
          - $ref: '#/components/schemas/MeshDefaultModeEnum'
          default: and
          description: |-
            Modo padrão para blocos MeSH sem 'mode' explícito: 'and' (precisão) ou 'or' (recall)

            * `and` - and
            * `or` - or
        magnitude_snapshot: {}
        slug:
          type: string
          readOnly: true
          title: Identificador
          description: 'Gerado automaticamente: {titulo}_{user}_davinci'
          pattern: ^[-a-zA-Z0-9_]+$
        title:
          type: string
          title: Título do Projeto
          maxLength: 255
        description:
          type: string
          title: Descrição
        query_term:
          type: string
          title: Termo de Busca Principal
          description: 'Ex: "hidradenitis AND cancer", "cardiovascular disease"'
          maxLength: 500
        date_from:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
          title: Ano Inicial
        date_to:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
          title: Ano Final
        advanced_search_enabled:
          type: boolean
          title: Pesquisa Avançada Habilitada
        status:
          allOf:
          - $ref: '#/components/schemas/DaVinciProjectStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          readOnly: true
      required:
      - created_at
      - id
      - query_term
      - slug
      - status
      - title
      - total_datasets
      - total_papers
      - updated_at
      - user
    DaVinciProjectStatusEnum:
      enum:
      - draft
      - searching
      - curating
      - analyzing
      - complete
      type: string
      description: |-
        * `draft` - Rascunho
        * `searching` - Buscando
        * `curating` - Em Curadoria
        * `analyzing` - Analisando
        * `complete` - Completo
    DatasetBulkCurateRequest:
      type: object
      description: Body de bulk_curate de datasets.
      properties:
        dataset_ids:
          type: array
          items:
            type: integer
          description: Lista de IDs de ProjectDataset a atualizar.
        curation_status:
          allOf:
          - $ref: '#/components/schemas/DatasetCurationStatusEnum'
          description: |-
            Status de curadoria a aplicar.

            * `pending` - Pendente
            * `included` - Incluído
            * `excluded` - Excluído
            * `queued` - Na Fila de Download
            * `downloaded` - Baixado
        exclusion_reason:
          type: string
          default: ''
          description: Motivo de exclusão (usado quando curation_status=excluded).
      required:
      - curation_status
      - dataset_ids
    DatasetCurationStatusEnum:
      enum:
      - pending
      - included
      - excluded
      - queued
      - downloaded
      type: string
      description: |-
        * `pending` - Pendente
        * `included` - Incluído
        * `excluded` - Excluído
        * `queued` - Na Fila de Download
        * `downloaded` - Baixado
    DrugReference:
      type: object
      description: Paper do projeto que cita o medicamento, com suas sentenças de
        contexto.
      properties:
        project_paper_id:
          type: integer
          description: PK de ProjectPaper — usada no PATCH /projects/{id}/papers/<pk>/
            para toggle de curadoria. Distinta da PK de Paper (pmid para exibição).
        pmid:
          type: integer
          description: PubMed ID do paper.
        title:
          type: string
          description: Título do paper.
        pub_year:
          type: integer
          nullable: true
          description: Ano de publicação.
        journal:
          type: string
          description: Periódico (ISO abbrev).
        curation_status:
          type: string
          description: Status de curadoria do paper neste projeto (included, excluded,
            pending, maybe).
        snippets:
          type: array
          items:
            $ref: '#/components/schemas/DrugSnippet'
      required:
      - curation_status
