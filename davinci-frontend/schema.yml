components:
  schemas:
    BlankEnum:
      enum:
      - ''
    BulkCurateResponse:
      type: object
      description: 'Resposta genérica de operações bulk: quantidade de registros atualizados.'
      properties:
        updated:
          type: integer
      required:
      - updated
    ClinicalCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          title: Nome
          maxLength: 100
        description:
          type: string
          title: Descrição
        keywords:
          title: Keywords de Classificação
          description: Termos usados pelo Rust para detectar esta categoria no abstract
        is_default:
          type: boolean
          title: Categoria Padrão
          description: True para os 5 eixos padrão (não deletável)
        priority:
          type: integer
          maximum: 32767
          minimum: 0
          title: Prioridade
      required:
      - id
      - name
      - slug
    ClinicalCategoryBrief:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          title: Nome
          maxLength: 100
      required:
      - id
      - name
      - slug
    ConfidenceEnum:
      enum:
      - auto
      - confirmed
      - rejected
      type: string
      description: |-
        * `auto` - Automático (elink/co-ocorrência)
        * `confirmed` - Confirmado pelo Pesquisador
        * `rejected` - Rejeitado pelo Pesquisador
    ContextStatusEnum:
      enum:
      - ready
      - computing
      type: string
      description: |-
        * `ready` - ready
        * `computing` - computing
    CurationStatusEnum:
      enum:
      - pending
      - included
      - excluded
      - maybe
      type: string
      description: |-
        * `pending` - Pendente
        * `included` - Incluído
        * `excluded` - Excluído
        * `maybe` - Talvez
    DaVinciProject:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        query_synonyms:
          type: array
          items:
            type: string
        target_organisms:
          type: array
          items:
            type: string
        target_tissues:
          type: array
          items:
            type: string
        total_papers:
          type: integer
          readOnly: true
          default: 0
        total_datasets:
          type: integer
          readOnly: true
          default: 0
        slug:
          type: string
          readOnly: true
          title: Identificador
          description: 'Gerado automaticamente: {titulo}_{user}_davinci'
          pattern: ^[-a-zA-Z0-9_]+$
        title:
          type: string
          title: Título do Projeto
          maxLength: 255
        description:
          type: string
          title: Descrição
        query_term:
          type: string
          title: Termo de Busca Principal
          description: 'Ex: "hidradenitis AND cancer", "cardiovascular disease"'
          maxLength: 500
        date_from:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
          title: Ano Inicial
        date_to:
          type: integer
          maximum: 32767
          minimum: 0
          nullable: true
          title: Ano Final
        status:
          allOf:
          - $ref: '#/components/schemas/DaVinciProjectStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
          readOnly: true
      required:
      - created_at
      - id
      - query_term
      - slug
      - status
      - title
      - total_datasets
      - total_papers
      - updated_at
      - user
    DaVinciProjectStatusEnum:
      enum:
      - draft
      - searching
      - curating
      - analyzing
      - complete
      type: string
      description: |-
        * `draft` - Rascunho
        * `searching` - Buscando
        * `curating` - Em Curadoria
        * `analyzing` - Analisando
        * `complete` - Completo
    DatasetBulkCurateRequest:
      type: object
      description: Body de bulk_curate de datasets.
      properties:
        dataset_ids:
          type: array
          items:
            type: integer
          description: Lista de IDs de ProjectDataset a atualizar.
        curation_status:
          allOf:
          - $ref: '#/components/schemas/DatasetCurationStatusEnum'
          description: |-
            Status de curadoria a aplicar.

            * `pending` - Pendente
            * `included` - Incluído
            * `excluded` - Excluído
            * `queued` - Na Fila de Download
            * `downloaded` - Baixado
        exclusion_reason:
          type: string
          default: ''
          description: Motivo de exclusão (usado quando curation_status=excluded).
      required:
      - curation_status
      - dataset_ids
    DatasetCurationStatusEnum:
      enum:
      - pending
      - included
      - excluded
      - queued
      - downloaded
      type: string
      description: |-
        * `pending` - Pendente
        * `included` - Incluído
        * `excluded` - Excluído
        * `queued` - Na Fila de Download
        * `downloaded` - Baixado
    EntityContext:
      type: object
      properties:
        entity_type:
          $ref: '#/components/schemas/EntityTypeEnum'
        entity_name:
          type: string
          title: Nome da Entidade
          maxLength: 255
        sentence:
          type: string
          title: Sentença Contexto
          description: Sentença do abstract contendo a entidade
        sentence_position:
          type: integer
          maximum: 32767
          minimum: -32768
          title: Posição no Abstract
          description: Índice da sentença no abstract (0-based; -1 = sentinela "processado
            sem snippet")
      required:
      - entity_name
      - entity_type
      - sentence
    EntityTypeEnum:
      enum:
      - gene
      - drug
      - variant
      - disease
      - pathway
      type: string
      description: |-
        * `gene` - Gene
        * `drug` - Droga
        * `variant` - Variante
        * `disease` - Doença
        * `pathway` - Pathway
    GeneReference:
      type: object
      description: Paper do projeto que cita o gene, com suas sentenças de contexto.
      properties:
        project_paper_id:
          type: integer
          description: PK de ProjectPaper — usada no PATCH /projects/{id}/papers/<pk>/
            para toggle de curadoria. Distinta da PK de Paper (pmid para exibição).
        pmid:
          type: integer
          description: PubMed ID do paper.
        title:
          type: string
          description: Título do paper.
        pub_year:
          type: integer
          nullable: true
          description: Ano de publicação.
        journal:
          type: string
          description: Periódico (ISO abbrev).
        curation_status:
          type: string
          description: Status de curadoria do paper neste projeto (included, excluded,
            pending, maybe).
        snippets:
          type: array
          items:
            $ref: '#/components/schemas/GeneSnippet'
      required:
      - curation_status
      - journal
      - pmid
      - project_paper_id
      - pub_year
      - snippets
      - title
    GeneSnippet:
      type: object
      description: Uma sentença do abstract que contém o gene.
      properties:
        sentence:
          type: string
          description: Sentença do abstract contendo o gene.
        sentence_position:
          type: integer
          description: Índice 0-based da sentença no abstract.
      required:
      - sentence
