          type: integer
          description: Número de papers distintos com curation_status='included' que
            citam o descriptor.
        unique_citations_total:
          type: integer
          description: Número de papers distintos (qualquer status) do projeto que
            citam o descriptor.
        ncbi_mesh_url:
          type: string
          description: URL de busca NCBI MeSH para o descriptor (https://www.ncbi.nlm.nih.gov/mesh/?term=<descriptor>
