    ProjectDrugDetail:
      type: object
      description: |-
        Detalhe de um medicamento no projeto: métricas agregadas + referências com snippets.

        context_status:
            'ready'     — cache de snippets completo e fresco para todos os papers.
            'computing' — task de derivação foi disparada; alguns snippets podem faltar.
      properties:
        drug_name:
          type: string
          description: Nome representativo do medicamento.
        drugbank_id:
          type: string
          description: DrugBank ID representativo (primeiro não-vazio). String vazia
            quando ausente.
        unique_citations_included:
          type: integer
          description: Papers distintos com status 'included' que citam o medicamento.
        unique_citations_total:
          type: integer
          description: Papers distintos (qualquer status) que citam o medicamento
            neste projeto.
        drugbank_url:
          type: string
          nullable: true
          description: URL direta no DrugBank. Null quando drugbank_id ausente.
        pubchem_search_url:
          type: string
          description: URL de busca PubChem por nome. Sempre presente.
        references:
          type: array
          items:
            $ref: '#/components/schemas/DrugReference'
        context_status:
          allOf:
          - $ref: '#/components/schemas/ContextStatusEnum'
          description: |-
            'ready' | 'computing' — estado do cache de snippets.

            * `ready` - ready
            * `computing` - computing
      required:
      - context_status
      - drug_name
      - drugbank_id
      - drugbank_url
      - pubchem_search_url
      - references
      - unique_citations_included
      - unique_citations_total
    ProjectDrugList:
      type: object
      description: |-
        Item da lista agregada de medicamentos do projeto.

        Cada registro representa um drug_name_lower único com contagens
        agregadas calculadas numa única query no DrugService.

        Chave de agrupamento: drug_name_lower (canônica).
        Exibição: drug_name representativo (Max do grupo).
      properties:
        drug_name:
          type: string
          description: Nome representativo do medicamento (Max do grupo por drug_name_lower).
        drugbank_id:
          type: string
          description: DrugBank ID representativo do grupo (primeiro não-vazio). String
            vazia ou null quando ausente.
        unique_citations_included:
          type: integer
          description: Número de papers distintos com curation_status='included' que
            citam o medicamento.
        unique_citations_total:
          type: integer
          description: Número de papers distintos (qualquer status) do projeto que
            citam o medicamento.
        mention_count_total:
          type: integer
          description: Soma de mention_count de todos os PaperDrug do projeto para
            este medicamento. Pode contar o mesmo paper mais de uma vez se houver
            múltiplas menções.
        drugbank_url:
          type: string
          nullable: true
          description: URL direta no DrugBank (https://go.drugbank.com/drugs/<drugbank_id>).
            Null quando drugbank_id ausente.
        pubchem_search_url:
          type: string
          description: URL de busca PubChem por nome do medicamento (https://pubchem.ncbi.nlm.nih.gov/#query=<drug_name>
            URL-encoded). Sempre presente.
      required:
      - drug_name
      - drugbank_id
      - drugbank_url
      - mention_count_total
      - pubchem_search_url
      - unique_citations_included
      - unique_citations_total
    ProjectGeneDetail:
