    OmicTypeEnum:
      enum:
      - genomic
      - transcriptomic
      - proteomic
      - metabolomic
      - epigenomic
      - metagenomic
      - microbiome
      - multi_omic
      - other
      type: string
      description: |-
        * `genomic` - Genômica
        * `transcriptomic` - Transcriptômica
        * `proteomic` - Proteômica
        * `metabolomic` - Metabolômica
        * `epigenomic` - Epigenômica
        * `metagenomic` - Metagenômica
        * `microbiome` - Microbiômica
        * `multi_omic` - Multi-ômica
        * `other` - Outro
    OmicsSearchRequest:
      type: object
      description: Body de /projects/{id}/omics_search/ — todos os campos são opcionais.
      properties:
        sources:
          type: array
          items:
            type: string
          nullable: true
          description: Lista de fontes ômicas (GEO, SRA, BioProject, GWAS). Null =
            todas.
        max_per_source:
          type: integer
          default: 500
          description: Máximo de registros por fonte.
    OrphanLinkSuggestion:
      type: object
      description: |-
        Serializer READ-ONLY para sugestões de órfãos (Nível 2).

        Recebe dicts vindos de suggest_orphan_links() — não é um ModelSerializer
        porque o resultado é uma projeção SQL, não uma instância de model.

        Nunca grava nada: não há create/update.
      properties:
        suggestion_type:
          allOf:
          - $ref: '#/components/schemas/SuggestionTypeEnum'
          description: |-
            'dataset_missing': paper já no projeto, dataset ausente. 'paper_missing': dataset já no projeto, paper ausente.

            * `dataset_missing` - dataset_missing
            * `paper_missing` - paper_missing
        global_link_id:
          type: integer
          description: PK de DatasetPaperLink (vínculo global descoberto pelo Rust
            via elink).
        link_source:
          type: string
          description: 'Origem do vínculo global: ''elink'', ''geo_xml'', ''manual''.'
        project_paper_id:
          type: integer
          nullable: true
          description: PK de ProjectPaper (paper já no projeto). null quando suggestion_type
            == paper_missing (paper ainda não está no projeto).
        paper_pmid:
          type: integer
          description: PMID do paper (ponta existente ou sugerida).
        paper_title:
          type: string
          description: Título do paper.
        project_dataset_id:
          type: integer
          nullable: true
          description: PK de ProjectDataset (dataset já no projeto). null quando suggestion_type
            == dataset_missing (dataset ainda não está no projeto).
        dataset_id:
          type: integer
          description: PK de OmicDataset (dataset global — usado para adicionar ao
            projeto depois).
        dataset_accession:
          type: string
          description: Accession do dataset (GSE*, SRP*, etc.).
        dataset_title:
          type: string
          description: Título do dataset.
        omic_type:
          type: string
          description: Tipo ômico do dataset (transcriptomic, genomic, etc.).
      required:
      - dataset_accession
      - dataset_id
      - dataset_title
      - global_link_id
      - link_source
      - omic_type
      - paper_pmid
      - paper_title
      - project_dataset_id
      - project_paper_id
      - suggestion_type
