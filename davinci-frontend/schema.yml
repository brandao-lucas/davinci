openapi: 3.0.3
info:
  title: DaVinci API
  version: 1.0.0
  description: API da plataforma DaVinci — ingestão, curadoria e exportação de literatura
    e metadados ômicos.
paths:
  /api/v1/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: Retorna (criando se necessário) o UserProfile do usuário Firebase
        autenticado.
      summary: Perfil do usuário autenticado
      tags:
      - auth
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
    patch:
      operationId: auth_me_partial_update
      description: Atualiza campos de perfil (institution, research_area, orcid_id,
        first_name, last_name).
      summary: Atualizar perfil do usuário
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserProfileUpdate'
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
          description: ''
  /api/v1/auth/verify/:
    post:
      operationId: auth_verify_create
      description: Retorna 200 com status=valid se o token Bearer é válido. 401 caso
        contrário.
      summary: Verificar token Firebase
      tags:
      - auth
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_VerifyTokenOk'
          description: ''
  /api/v1/clinical-categories/:
    get:
      operationId: clinical_categories_list
      description: |-
        Read-only global clinical categories.
        GET /api/v1/clinical-categories/
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - clinical-categories
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClinicalCategoryList'
          description: ''
  /api/v1/projects/:
    get:
      operationId: projects_list
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDaVinciProjectList'
          description: ''
    post:
      operationId: projects_create
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaVinciProject'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DaVinciProject'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DaVinciProject'
        required: true
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaVinciProject'
          description: ''
  /api/v1/projects/{id}/:
    get:
      operationId: projects_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this da vinci project.
        required: true
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaVinciProject'
          description: ''
    put:
      operationId: projects_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this da vinci project.
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DaVinciProject'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DaVinciProject'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DaVinciProject'
        required: true
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaVinciProject'
          description: ''
    patch:
      operationId: projects_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this da vinci project.
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDaVinciProject'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDaVinciProject'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDaVinciProject'
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DaVinciProject'
          description: ''
    delete:
      operationId: projects_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this da vinci project.
        required: true
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/projects/{id}/export/:
    get:
      operationId: projects_export_retrieve
      description: Exporta papers com curation_status=included em JSON (padrão) ou
        CSV (?export_format=csv).
      summary: Exportar papers incluídos
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this da vinci project.
        required: true
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: CSV com papers incluídos (quando export_format=csv)
  /api/v1/projects/{id}/omics_search/:
    post:
      operationId: projects_omics_search_create
      description: Cria e enfileira um job de busca em GEO/SRA/BioProject/GWAS para
        o projeto.
      summary: Disparar busca ômica
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this da vinci project.
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OmicsSearchRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OmicsSearchRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OmicsSearchRequest'
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDispatchResponse'
          description: ''
  /api/v1/projects/{id}/search/:
    post:
      operationId: projects_search_create
      description: Cria e enfileira um job de busca de literatura no PubMed para o
        projeto.
      summary: Disparar busca PubMed
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this da vinci project.
        required: true
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobDispatchResponse'
          description: ''
  /api/v1/projects/{id}/stats/:
    get:
      operationId: projects_stats_retrieve
      description: Retorna ProjectStats calculadas on-the-fly se ausentes.
      summary: Estatísticas do projeto
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this da vinci project.
        required: true
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectStats'
          description: ''
  /api/v1/projects/{project_pk}/categories/:
    get:
      operationId: projects_categories_list
      description: |-
        CRUD for project-scoped custom categories.
        /projects/{project_pk}/categories/
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserCategoryList'
          description: ''
    post:
      operationId: projects_categories_create
      description: |-
        CRUD for project-scoped custom categories.
        /projects/{project_pk}/categories/
      parameters:
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCategory'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UserCategory'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UserCategory'
        required: true
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCategory'
          description: ''
  /api/v1/projects/{project_pk}/categories/{id}/:
    patch:
      operationId: projects_categories_partial_update
      description: |-
        CRUD for project-scoped custom categories.
        /projects/{project_pk}/categories/
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedUserCategory'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedUserCategory'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedUserCategory'
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserCategory'
          description: ''
    delete:
      operationId: projects_categories_destroy
      description: |-
        CRUD for project-scoped custom categories.
        /projects/{project_pk}/categories/
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/projects/{project_pk}/datasets/:
    get:
      operationId: projects_datasets_list
      description: |-
        Curadoria de datasets ômicos dentro de um projeto.

        list:   GET  /projects/{project_pk}/datasets/
        detail: GET  /projects/{project_pk}/datasets/{id}/
        patch:  PATCH /projects/{project_pk}/datasets/{id}/
        search: GET  /projects/{project_pk}/datasets/search/?q=term
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectDatasetListList'
          description: ''
  /api/v1/projects/{project_pk}/datasets/{dataset_pk}/samples/:
    get:
      operationId: projects_datasets_samples_list
      description: |-
        Curadoria de amostras ômicas dentro de um projeto.

        Rotas registradas em urls.py:
          list/filter:  GET  /projects/{project_pk}/samples/
          detail:       GET  /projects/{project_pk}/samples/{id}/
          patch:        PATCH /projects/{project_pk}/samples/{id}/
          bulk_curate:  POST /projects/{project_pk}/samples/bulk_curate/

        Rota por dataset (para a página de samples de um dataset específico):
          GET  /projects/{project_pk}/datasets/{dataset_pk}/samples/
          (mesma view, parâmetro dataset_pk opcional tratado em get_queryset)

        firebase-auth-guard: _get_project filtra sempre por request.user.
        curation-audit-trail: perform_update e bulk_curate setam curated_at;
          sem DELETE — exclusão é curation_status='excluded'.
        postgres-fts-patterns: select_related em todos os querysets (sem N+1).
      parameters:
      - in: path
        name: dataset_pk
        schema:
          type: integer
        required: true
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectSampleListList'
          description: ''
  /api/v1/projects/{project_pk}/datasets/{id}/:
    get:
      operationId: projects_datasets_retrieve
      description: |-
        Curadoria de datasets ômicos dentro de um projeto.

        list:   GET  /projects/{project_pk}/datasets/
        detail: GET  /projects/{project_pk}/datasets/{id}/
        patch:  PATCH /projects/{project_pk}/datasets/{id}/
        search: GET  /projects/{project_pk}/datasets/search/?q=term
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDatasetDetail'
          description: ''
    patch:
      operationId: projects_datasets_partial_update
      description: |-
        Curadoria de datasets ômicos dentro de um projeto.

        list:   GET  /projects/{project_pk}/datasets/
        detail: GET  /projects/{project_pk}/datasets/{id}/
        patch:  PATCH /projects/{project_pk}/datasets/{id}/
        search: GET  /projects/{project_pk}/datasets/search/?q=term
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProjectDatasetCurate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProjectDatasetCurate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProjectDatasetCurate'
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDatasetCurate'
          description: ''
  /api/v1/projects/{project_pk}/datasets/bulk_curate/:
    post:
      operationId: projects_datasets_bulk_curate_create
      description: Atualiza curation_status de múltiplos ProjectDatasets. Dispara
        SAMPLE_FETCH para os incluídos.
      summary: Curadoria em massa de datasets
      parameters:
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DatasetBulkCurateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DatasetBulkCurateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DatasetBulkCurateRequest'
        required: true
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCurateResponse'
          description: ''
  /api/v1/projects/{project_pk}/datasets/search/:
    get:
      operationId: projects_datasets_search_list
      description: 'Busca full-text em datasets do projeto via search_vector. Parâmetro
        obrigatório: ?q=termo.'
      summary: Busca FTS em datasets do projeto
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectDatasetListList'
          description: ''
  /api/v1/projects/{project_pk}/genes/:
    get:
      operationId: projects_genes_list
      description: 'Retorna lista paginada de genes mencionados nos papers do projeto,
        agrupados por gene_symbol. Inclui contagens de citações únicas (included e
        total) e soma de menções. Filtros: ?q= (icontains no símbolo), ?ordering=
        (unique_citations_included | unique_citations_total | mention_count_total
        | gene_symbol; prefixe com ''-'' para DESC), ?included_only=true (omite genes
        sem nenhum paper incluído). Default: -unique_citations_included. Paginação:
        ?page=, ?page_size= (máx 100).'
      summary: Lista genes do projeto (agregada)
      parameters:
      - in: query
        name: included_only
        schema:
          type: boolean
        description: 'Quando true, retorna apenas genes com ao menos um paper com
          curation_status=included (unique_citations_included > 0). Aceita true/false/1/0.
          Default: false.'
      - in: query
        name: ordering
        schema:
          type: string
        description: 'Campo de ordenação. Valores válidos: unique_citations_included,
          unique_citations_total, mention_count_total, gene_symbol (prefixe com -
          para DESC).'
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      - in: query
        name: q
        schema:
          type: string
        description: Filtro por símbolo (icontains).
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProjectGeneListList'
          description: ''
  /api/v1/projects/{project_pk}/genes/{gene_symbol}/:
    get:
      operationId: projects_genes_retrieve
      description: Retorna métricas do gene e, para cada paper do projeto que o cita,
        as sentenças do abstract onde o gene aparece (snippets). Se o cache de snippets
        estiver frio ou stale para algum paper, uma task Celery é disparada e context_status='computing'
        é retornado; chamadas subsequentes retornam 'ready' quando o cache estiver
        pronto. gene_symbol inválido (> 64 chars) ou inexistente no projeto → 404.
      summary: Detalhe de gene do projeto (com snippets de contexto)
      parameters:
      - in: path
        name: gene_symbol
        schema:
          type: string
        required: true
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectGeneDetail'
          description: ''
  /api/v1/projects/{project_pk}/jobs/:
    get:
      operationId: projects_jobs_list
      description: |-
        Read + cancel ingestion jobs for a project.

        list:   GET  /projects/{project_pk}/jobs/
        detail: GET  /projects/{project_pk}/jobs/{id}/
        cancel: POST /projects/{project_pk}/jobs/{id}/cancel/
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: path
        name: project_pk
        schema:
          type: string
          format: uuid
        required: true
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - projects
      security:
      - FirebaseAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedIngestionJobList'
          description: ''
