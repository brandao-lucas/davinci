    LinkedPaperBrief:
      type: object
      description: |-
        Resumo de um vínculo ProjectPaperDataset para exibir no detalhe de um dataset.

        Expõe os campos do paper vinculado + metadados do link.
        Filtrado pelo project_pk da rota — sem vazamento cross-project (Regra #3).
      properties:
        id:
          type: integer
          readOnly: true
        project_paper_id:
          type: integer
          readOnly: true
        paper_pmid:
          type: integer
          readOnly: true
        paper_title:
          type: string
          readOnly: true
        confidence:
          $ref: '#/components/schemas/ConfidenceEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - paper_pmid
      - paper_title
      - project_paper_id
    MagnitudePreview:
      type: object
      description: Resposta do endpoint POST /projects/{id}/search/preview/
      properties:
        free_text_count:
          type: integer
          description: Artigos encontrados só pela query de texto livre
        mesh_count:
          type: integer
          description: Artigos encontrados pelos termos MeSH combinados
        combined_count:
          type: integer
          description: Artigos encontrados pela query final combinada (preview idêntico
            à ingestão)
        overlap:
          type: integer
          description: Artigos presentes tanto em free_text quanto em MeSH
        only_free_text:
          type: integer
          description: Artigos presentes só em free_text (não indexados em MeSH ainda
            ou não cobertos)
        only_mesh:
          type: integer
          description: Artigos presentes só em MeSH (não cobertos pela query de texto
            livre)
        not_yet_indexed:
          type: integer
          description: Artigos fornecidos pelo publisher, ainda sem indexação MeSH
            completa
        reviews:
          type: integer
          description: Revisões (Review[pt]) na query combinada
        systematic_reviews:
          type: integer
          description: Revisões sistemáticas e meta-análises na query combinada
        by_year:
          type: array
          items:
            type: array
            items:
              type: integer
        by_pub_type:
          type: array
          items:
            type: array
            items: {}
        open_access:
          type: array
          items:
            type: integer
          nullable: true
        query_used:
          type: string
          readOnly: true
          description: Query PubMed exata usada no preview (idêntica à que será usada
            na ingestão)
      required:
      - combined_count
      - free_text_count
      - mesh_count
      - not_yet_indexed
      - only_free_text
      - only_mesh
      - overlap
      - query_used
      - reviews
      - systematic_reviews
    MeSHReference:
      type: object
      description: Paper do projeto que cita o descriptor MeSH, com sentenças de contexto.
      properties:
        project_paper_id:
          type: integer
          description: PK de ProjectPaper — usada no PATCH /projects/{id}/papers/<pk>/
            para toggle de curadoria. Distinta da PK de Paper (pmid para exibição).
        pmid:
          type: integer
          description: PubMed ID do paper.
        title:
          type: string
          description: Título do paper.
        pub_year:
          type: integer
          nullable: true
          description: Ano de publicação.
        journal:
          type: string
          description: Periódico (ISO abbrev).
        curation_status:
          type: string
          description: Status de curadoria do paper neste projeto (included, excluded,
            pending, maybe).
        is_major_topic:
          type: boolean
          description: True se este descriptor é tópico principal (MajorTopicYN='Y')
            no paper.
        snippets:
          type: array
          items:
            $ref: '#/components/schemas/MeSHSnippet'
      required:
      - curation_status
      - is_major_topic
      - journal
      - pmid
      - project_paper_id
      - pub_year
      - snippets
      - title
    MeSHSnippet:
