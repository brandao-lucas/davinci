        papers_by_journal:
          type: object
          additionalProperties:
            type: integer
          readOnly: true
        papers_by_country:
          type: object
          additionalProperties:
            type: integer
          readOnly: true
        papers_by_clinical_category:
          type: object
          additionalProperties:
            type: integer
          readOnly: true
        datasets_by_omic_type:
          type: object
          additionalProperties:
            type: integer
          readOnly: true
        datasets_by_organism:
          type: object
          additionalProperties:
            type: integer
          readOnly: true
        top_genes:
          type: array
          items:
            type: object
            properties:
              gene:
                type: string
              count:
