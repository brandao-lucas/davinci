          description: Papers distintos (qualquer status) que citam o gene neste projeto.
        references:
          type: array
          items:
            $ref: '#/components/schemas/GeneReference'
        context_status:
          allOf:
          - $ref: '#/components/schemas/ContextStatusEnum'
          description: |-
            'ready' | 'computing' — estado do cache de snippets.

            * `ready` - ready
            * `computing` - computing
      required:
      - context_status
      - entrez_id
      - gene_symbol
      - references
      - unique_citations_included
      - unique_citations_total
    ProjectGeneList:
      type: object
      description: |-
        Item da lista agregada de genes do projeto.

        Cada registro representa um gene_symbol único com contagens
        agregadas calculadas numa única query no GeneService.
      properties:
        gene_symbol:
          type: string
          description: 'Símbolo do gene (ex.: TNF, BRCA1).'
        entrez_id:
          type: integer
          nullable: true
          description: Entrez Gene ID representativo do grupo (primeiro não-nulo).
            Nulo se ausente.
        unique_citations_included:
          type: integer
          description: Número de papers distintos com curation_status='included' que
            citam o gene.
        unique_citations_total:
          type: integer
          description: Número de papers distintos (qualquer status) do projeto que
            citam o gene.
        mention_count_total:
          type: integer
          description: Soma de mention_count de todos os PaperGene do projeto para
            este gene.
      required:
      - entrez_id
      - gene_symbol
      - mention_count_total
      - unique_citations_included
      - unique_citations_total
