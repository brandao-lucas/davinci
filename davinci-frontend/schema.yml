        unique_citations_included:
          type: integer
          description: Papers distintos com status 'included' que citam o descriptor.
        unique_citations_total:
          type: integer
          description: Papers distintos (qualquer status) que citam o descriptor neste
            projeto.
        qualifiers:
          type: array
          items:
            type: string
          description: Qualifiers MeSH distintos não-vazios entre os papers do projeto.
        ncbi_mesh_url:
          type: string
          description: URL de busca NCBI MeSH para o descriptor.
        references:
          type: array
          items:
            $ref: '#/components/schemas/MeSHReference'
        context_status:
          allOf:
          - $ref: '#/components/schemas/ContextStatusEnum'
          description: |-
            'ready' | 'computing' — estado do cache de snippets.

            * `ready` - ready
            * `computing` - computing
      required:
      - context_status
      - descriptor
      - major_topic_count
      - ncbi_mesh_url
      - qualifiers
      - references
      - unique_citations_included
      - unique_citations_total
    ProjectMeSHList:
      type: object
