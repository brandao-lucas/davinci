      - total_samples
    ProjectVariantDetail:
      type: object
      description: |-
        Detalhe de uma variante no projeto: métricas agregadas + anotação clínica
        + referências com snippets.

        context_status:
            'ready'     — cache de snippets completo e fresco para todos os papers.
            'computing' — task de derivação foi disparada; alguns snippets podem faltar.

        annotation:
            Objeto VariantAnnotationSerializer completo quando disponível.
            Null quando não há VariantAnnotation para este rs_number (D2).
      properties:
        rs_number:
          type: string
          description: 'RS Number da variante (ex.: rs1801133).'
        unique_citations_included:
          type: integer
          description: Papers distintos com status 'included' que citam a variante.
        unique_citations_total:
          type: integer
          description: Papers distintos (qualquer status) que citam a variante neste
            projeto.
        mention_count_total:
          type: integer
          description: Soma de mention_count de todos os PaperVariant do projeto para
            esta variante.
        annotation:
          oneOf:
          - type: object
            properties:
              gene_symbol:
                type: string
              gene_name:
                type: string
              entrez_id:
                type: integer
                nullable: true
              chromosome:
                type: string
              position:
                type: integer
                nullable: true
              alleles:
                type: string
              maf:
                type: number
                nullable: true
              clinical_significance:
                type: string
            required:
            - gene_symbol
            - gene_name
            - entrez_id
            - chromosome
            - position
            - alleles
            - maf
            - clinical_significance
          - type: 'null'
          description: Anotação completa da variante (dbSNP/ClinVar). Null quando
            não há VariantAnnotation para este rs_number.
          readOnly: true
        references:
          type: array
          items:
            $ref: '#/components/schemas/VariantReference'
        context_status:
          allOf:
          - $ref: '#/components/schemas/ContextStatusEnum'
          description: |-
            'ready' | 'computing' — estado do cache de snippets.

            * `ready` - ready
            * `computing` - computing
      required:
      - annotation
      - context_status
      - mention_count_total
      - references
      - rs_number
      - unique_citations_included
      - unique_citations_total
    ProjectVariantList:
      type: object
      description: |-
        Item da lista agregada de variantes do projeto.

        Cada registro representa um rs_number único com contagens
        agregadas calculadas numa única query no VariantService.
        O campo 'annotation' é preenchido via in_bulk() pós-paginação
        no ViewSet e pode ser None quando não há VariantAnnotation (D2).
      properties:
        rs_number:
          type: string
          description: 'RS Number da variante (ex.: rs1801133).'
        unique_citations_included:
          type: integer
          description: Número de papers distintos com curation_status='included' que
            citam a variante.
        unique_citations_total:
          type: integer
          description: Número de papers distintos (qualquer status) do projeto que
            citam a variante.
        mention_count_total:
          type: integer
          description: Soma de mention_count de todos os PaperVariant do projeto para
            esta variante.
        annotation:
          oneOf:
          - type: object
            properties:
              gene_symbol:
                type: string
              clinical_significance:
                type: string
              chromosome:
                type: string
              maf:
                type: number
                nullable: true
            required:
            - gene_symbol
            - clinical_significance
            - chromosome
            - maf
          - type: 'null'
          description: Anotação resumida (gene_symbol, clinical_significance, chromosome,
            maf). Null quando não há VariantAnnotation para este rs_number.
          readOnly: true
      required:
      - annotation
      - mention_count_total
      - rs_number
      - unique_citations_included
      - unique_citations_total
    SampleBulkCurateRequest:
      type: object
      description: Body de bulk_curate de samples.
      properties:
        sample_ids:
          type: array
          items:
            type: integer
          description: Lista de IDs de ProjectSample a atualizar.
        curation_status:
          allOf:
          - $ref: '#/components/schemas/CurationStatusEnum'
          description: |-
            Status de curadoria a aplicar.

            * `pending` - Pendente
            * `included` - Incluído
            * `excluded` - Excluído
            * `maybe` - Talvez
        exclusion_reason:
          type: string
          default: ''
          description: Motivo de exclusão (usado quando curation_status=excluded).
      required:
      - curation_status
      - sample_ids
    SearchPreviewRequest:
      type: object
      description: Body de POST /projects/{id}/search/preview/
      properties:
        selected_mesh:
          description: Lista de descritores MeSH para calcular o preview. Se ausente,
            usa selected_mesh do projeto.
        mesh_default_mode:
          allOf:
          - $ref: '#/components/schemas/MeshDefaultModeEnum'
          default: and
          description: |-
            Modo padrão para blocos sem mode explícito

            * `and` - and
            * `or` - or
        panel_flags:
          allOf:
          - $ref: '#/components/schemas/PanelFlags'
          description: Flags de painéis adicionais do preview de magnitude
    SourceDbEnum:
      enum:
      - geo
      - sra
      - arrayexpress
      - tcga
      - bioproject
      - gwas_catalog
      type: string
      description: |-
        * `geo` - GEO (Gene Expression Omnibus)
        * `sra` - Sequence Read Archive
        * `arrayexpress` - ArrayExpress
        * `tcga` - TCGA
        * `bioproject` - BioProject
        * `gwas_catalog` - GWAS Catalog
    SuggestionTypeEnum:
      enum:
      - dataset_missing
      - paper_missing
      type: string
      description: |-
        * `dataset_missing` - dataset_missing
        * `paper_missing` - paper_missing
    UserCategory:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Nome da Categoria
          maxLength: 100
        keywords:
          description: Termos para classificação automática ou manual
        color:
          type: string
          title: Cor (hex)
          description: Para visualização no frontend
          maxLength: 7
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
    UserCategoryBrief:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          title: Nome da Categoria
          maxLength: 100
        color:
          type: string
          title: Cor (hex)
          description: Para visualização no frontend
          maxLength: 7
      required:
      - id
      - name
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        firebase_uid:
          type: string
          readOnly: true
          description: UID do Firebase Authentication
        auth_provider:
          type: string
          readOnly: true
          description: Provider usado no login (google.com, password, oidc.orcid)
        orcid_id:
          type: string
          nullable: true
          description: 'ORCID iD do pesquisador (formato: 0000-0000-0000-0000)'
          maxLength: 50
        institution:
          type: string
          maxLength: 255
        research_area:
          type: string
          maxLength: 255
        avatar_url:
          type: string
          format: uri
          maxLength: 200
        ncbi_api_key:
          type: string
          writeOnly: true
          description: NCBI API Key pessoal (eleva rate limit de 3 para 10 req/s)
          maxLength: 255
      required:
      - auth_provider
      - email
      - firebase_uid
      - first_name
      - id
      - last_name
    VariantReference:
      type: object
      description: Paper do projeto que cita a variante, com suas sentenças de contexto.
      properties:
        project_paper_id:
          type: integer
          description: PK de ProjectPaper — usada no PATCH /projects/{id}/papers/<pk>/
            para toggle de curadoria. Distinta da PK de Paper (pmid para exibição).
        pmid:
          type: integer
          description: PubMed ID do paper.
        title:
          type: string
          description: Título do paper.
        pub_year:
          type: integer
          nullable: true
          description: Ano de publicação.
        journal:
          type: string
          description: Periódico (ISO abbrev).
        curation_status:
          type: string
          description: Status de curadoria do paper neste projeto (included, excluded,
            pending, maybe).
        snippets:
          type: array
          items:
            $ref: '#/components/schemas/VariantSnippet'
      required:
      - curation_status
      - journal
      - pmid
      - project_paper_id
      - pub_year
      - snippets
      - title
    VariantSnippet:
      type: object
      description: Uma sentença do abstract que contém a variante.
      properties:
        sentence:
          type: string
          description: Sentença do abstract contendo a variante.
        sentence_position:
          type: integer
          description: Índice 0-based da sentença no abstract.
      required:
      - sentence
      - sentence_position
    _VerifyTokenOk:
      type: object
      properties:
        status:
          type: string
        uid:
          type: string
      required:
      - status
      - uid
  securitySchemes:
    FirebaseAuth:
      type: http
      scheme: bearer
      bearerFormat: Firebase ID Token
      description: Token Firebase obtido via Firebase Authentication SDK.
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
